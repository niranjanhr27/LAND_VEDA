spring.application.name=backend-local

spring.datasource.url=jdbc:h2:mem:landveda;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

server.port=8080

aws.accessKeyId=localAccessKey
aws.secretKey=localSecretKey
aws.region=us-east-1
aws.s3.bucketName=local-bucket

groq.api.key=${GROQ_API_KEY:}
fast2sms.api.key=${FAST2SMS_API_KEY:}
