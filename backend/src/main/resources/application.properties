# LandVeda Backend Configuration

# Application Name
spring.application.name=backend

# MySQL Database connection with environment variable overrides and defaults
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/landveda}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:YOUR_DATABASE_PASSWORD}

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Server port
server.port=8080

# Backend Base URL (for generating document URLs)
app.backend.base-url=${BACKEND_BASE_URL:http://localhost:8080}

# GROQ API Key
groq.api.key=${GROQ_API_KEY:}

# Fast2SMS API Key
fast2sms.api.key=${FAST2SMS_API_KEY:}

# File Upload Configuration (Allow up to 10MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
