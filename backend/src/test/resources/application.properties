spring.application.name=backend-test

# Use in-memory H2 database for testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# AWS S3 Mock Config
aws.accessKeyId=mockAccessKeyId
aws.secretKey=mockSecretKey
aws.region=us-east-1
aws.s3.bucketName=mockBucket

# GROQ Mock Config
groq.api.key=mockGroqKey

# Fast2SMS Mock Config
fast2sms.api.key=mockFast2SmsKey
